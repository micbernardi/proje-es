<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Organizador de Projeções</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --navy-900:#0F2540; --navy-700:#1B3A5F; --navy-600:#16365C;
  --gold:#C2922E; --gold-deep:#9C7415; --gold-soft:#FBF1D6; --gold-edge:#EBD49A;
  --paper:#F5F6F8; --card:#FFFFFF; --ink:#141A22; --muted:#5C6675; --faint:#8B94A3;
  --line:#E5E8EE; --line-strong:#CFD5DF;
  --green-ink:#1B7A43; --green-fill:#E4F4EA; --green-edge:#BBE3C8;
  --sans:"IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --shadow:0 1px 2px rgba(15,37,64,.06),0 10px 30px rgba(15,37,64,.07);
}
*{box-sizing:border-box} html,body{margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}

.topbar{background:linear-gradient(180deg,var(--navy-900),var(--navy-700));color:#fff;padding:18px 26px;display:flex;align-items:center;gap:15px;border-bottom:3px solid var(--gold)}
.brandmark{width:38px;height:38px;border-radius:9px;flex:none;background:radial-gradient(circle at 30% 30%,var(--gold),var(--gold-deep));display:grid;place-items:center;color:var(--navy-900);font-family:var(--mono);font-weight:700;font-size:17px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.topbar h1{font-size:18px;font-weight:600;margin:0}
.topbar .sub{font-size:12px;color:#A9BBD0;margin-top:1px;font-family:var(--mono)}

.wrap{max-width:780px;margin:0 auto;padding:34px 22px 60px}

/* empty / dropzone */
.empty{display:grid;place-items:center}
.drop{width:100%;background:var(--card);border:1.5px dashed var(--line-strong);border-radius:16px;padding:42px 34px;text-align:center;transition:border-color .15s,background .15s;cursor:pointer}
.drop.over{border-color:var(--gold);background:#FFFDF6}
.drop .ic{width:58px;height:58px;border-radius:15px;background:var(--gold-soft);color:var(--gold-deep);display:grid;place-items:center;margin:0 auto 16px;border:1px solid var(--gold-edge)}
.drop h2{margin:0 0 8px;font-size:20px}
.drop p{margin:0 auto 22px;color:var(--muted);max-width:480px}
.cta{display:inline-flex;gap:8px;align-items:center;background:var(--navy-600);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer}
.cta:hover{background:var(--navy-700)}
.fmt{margin-top:22px;font-family:var(--mono);font-size:11.5px;color:var(--faint);background:#FAFBFC;border:1px solid var(--line);border-radius:8px;padding:10px 14px;display:inline-block;line-height:1.7}
.fmt b{color:var(--navy-600)}

/* loaded list */
.loaded{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px 18px 22px}
.lhead{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.lhead-actions{display:flex;gap:8px}
.addbtn{background:transparent;border:1px solid var(--line-strong);color:var(--navy-700);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0}
.addbtn:hover{border-color:var(--gold);color:var(--gold-deep)}
.clearbtn{background:transparent;border:1px solid var(--line-strong);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0}
.clearbtn:hover{border-color:#E0A0A0;color:#B42318;background:#FDF3F2}
.flist{list-style:none;margin:0 0 18px;padding:0;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#FCFDFE}
.frow .fi{width:34px;height:34px;border-radius:8px;flex:none;display:grid;place-items:center;background:var(--gold-soft);color:var(--gold-deep);border:1px solid var(--gold-edge)}
.fmeta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.fname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fsub{font-family:var(--mono);font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:5px;border:1px solid}
.tag.un{background:var(--green-fill);color:var(--green-ink);border-color:var(--green-edge)}
.tag.rs{background:var(--gold-soft);color:var(--gold-deep);border-color:var(--gold-edge)}
.rm{margin-left:auto;flex:none;width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--faint);font-size:18px;line-height:1;cursor:pointer}
.rm:hover{border-color:#E0A0A0;color:#B42318;background:#FDF3F2}

.download{width:100%;display:inline-flex;justify-content:center;align-items:center;gap:9px;background:var(--gold);color:#3a2c06;border:none;border-radius:11px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer}
.download:hover{background:var(--gold-deep);color:#fff}
.download:disabled{opacity:.55;cursor:default}
.hint2{margin:12px 2px 0;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.5}

.orderbar{display:flex;align-items:center;gap:12px;margin:2px 2px 14px;flex-wrap:wrap}
.orderlbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.seg{display:inline-flex;background:#F1F3F7;border:1px solid var(--line-strong);border-radius:9px;padding:3px;gap:3px}
.segbtn{appearance:none;border:none;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:7px;cursor:pointer;transition:.12s}
.segbtn:hover{color:var(--navy-700)}
.segbtn.active{background:var(--navy-600);color:#fff;box-shadow:0 1px 2px rgba(15,37,64,.15)}

.dropmini{margin-top:14px;border:1.5px dashed var(--line-strong);border-radius:12px;padding:14px;text-align:center;color:var(--faint);font-size:12.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.dropmini.over{border-color:var(--gold);background:#FFFDF6;color:var(--gold-deep)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--navy-900);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 10px 30px rgba(15,37,64,.3);transition:.2s;pointer-events:none;z-index:50;border-left:3px solid var(--gold)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fade-in{animation:fade .35s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.fade-in{animation:none}.toast{transition:none}}
@media (max-width:560px){.wrap{padding:24px 16px 50px}.drop{padding:32px 20px}}

</style>
</head>
<body>
<header class="topbar">
  <div class="brandmark">P</div>
  <div>
    <h1>Organizador de Projeções</h1>
    <div class="sub">solte os arquivos crus · baixe o Excel formatado</div>
  </div>
</header>
<main class="wrap"><div id="app"></div></main>
<input type="file" id="file" accept=".xlsx,.xls,.csv" multiple style="display:none">
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
/* ConvCore — interpreta a matriz do arquivo cru do IQVIA.
   Lê a métrica no A1, acha o cabeçalho (linha com PERÍODO), dados depois. */
(function (global) {
  "use strict";
  function normVal(v) {
    if (v == null || v === "") return null;
    if (typeof v === "number") return v;
    let s = String(v).trim().replace(/r\$/i, "").replace(/[\s\u00a0]/g, "");
    if (s === "") return null;
    const d = s.indexOf("."), c = s.indexOf(",");
    if (d >= 0 && c >= 0) s = s.replace(/\./g, "").replace(",", ".");
    else if (c >= 0) s = s.replace(",", ".");
    const n = parseFloat(s); return isNaN(n) ? null : n;
  }
  function normPer(v) {
    if (v == null || v === "") return null;
    if (v instanceof Date) return v.getFullYear() * 100 + (v.getMonth() + 1);
    const s = String(v).trim();
    if (/^\d{6}$/.test(s)) { const n = +s; return n >= 200001 && n <= 210012 ? n : null; }
    let m = s.match(/^(\d{4})[-/.](\d{1,2})$/); if (m) return +m[1] * 100 + +m[2];
    m = s.match(/^(\d{1,2})[-/.](\d{4})$/); if (m) return +m[2] * 100 + +m[1];
    if (typeof v === "number") { const n = Math.round(v); if (n >= 200001 && n <= 210012) return n; }
    return null;
  }
  const stripAcc = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

  function parseRaw(matrix, filename) {
    filename = filename || "";
    let metric = null, setor = null;
    for (let r = 0; r < Math.min(matrix.length, 12); r++) {
      for (const cell of (matrix[r] || [])) {
        if (typeof cell === "string" && /Tipo de M.trica/i.test(cell)) {
          for (const ln of cell.split(/\r?\n/)) {
            if (/Tipo de M.trica/i.test(ln)) metric = /unidad/i.test(ln) ? "un" : "rs";
          }
          const sm = cell.match(/Setor é\s*(.+)/i); if (sm) setor = sm[1].trim().replace(/\u00a0/g, "");
        }
      }
    }
    // cabeçalho = primeira linha com PERÍODO
    let hr = -1;
    for (let r = 0; r < Math.min(matrix.length, 15); r++) {
      const norm = (matrix[r] || []).map((x) => (x == null ? "" : stripAcc(String(x).trim().toUpperCase())));
      if (norm.some((n) => n === "PERIODO")) { hr = r; break; }
    }
    if (hr < 0) { for (let r = 0; r < matrix.length; r++) { if (normPer((matrix[r] || [])[1]) != null) { hr = Math.max(0, r - 1); break; } } }
    if (hr < 0) hr = 0;
    const entity = String((matrix[hr] || [])[0] || "Item").trim();
    const data = {}, periodsSet = new Set();
    for (let r = hr + 1; r < matrix.length; r++) {
      const row = matrix[r] || [];
      const ent = row[0], per = normPer(row[1]), val = normVal(row[2]);
      if (ent == null || ent === "" || per == null || val == null) continue;
      const key = String(ent).trim();
      (data[key] || (data[key] = {}))[per] = val; periodsSet.add(per);
    }
    if (!metric) { const nm = (filename + " " + entity).toLowerCase(); metric = /unidad|qtd|quant|\bun\b/.test(nm) ? "un" : "rs"; }
    const periods = [...periodsSet].sort((a, b) => a - b);
    return { metric, entity, setor, periods, data };
  }

  const API = { normVal, normPer, parseRaw };
  if (typeof module !== "undefined" && module.exports) module.exports = API;
  else global.ConvCore = API;
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
/* XlsxBuild — monta o workbook formatado no navegador (ExcelJS),
   espelhando o design da versão Python. Testável em node passando o módulo exceljs. */
(function (global) {
  "use strict";
  const MES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const MESF = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
  const mlabel = (p) => MES[(p % 100) - 1] + "/" + String(Math.floor(p / 100)).slice(2);
  const mfull  = (p) => MESF[(p % 100) - 1] + "/" + String(Math.floor(p / 100)).slice(2);
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const clean = (s) => String(s).replace(/\s*\(SP0\)\s*$/i, "").trim();
  const A = (hex) => ({ argb: "FF" + hex });
  const fill = (hex) => ({ type: "pattern", pattern: "solid", fgColor: A(hex) });

  const T = {
    navy:"16365C", grp:"2E5496", grpfg:"FFFFFF", y2024:"7F7F7F", y2025:"595959", y2026:"BF8F00",
    det:"D6E0F0", detfg:"1F3864", det26:"F3D88E", det26soft:"F0E2A6", det26fg:"5A4A12",
    total:"FFF2CC", june:"FFF2CC", soft26:"FDF1D0", cmp:"FFFCF3", zebra:"F4F6F9",
    border:"BFBFBF", thick:"808080", gold:"BF8F00",
    green:"C6EFCE", greenfg:"006100", red:"FFC7CE", redfg:"9C0006",
  };
  const thin = { style:"thin", color:A(T.border) };
  const med  = { style:"medium", color:A(T.thick) };
  const goldMed = { style:"medium", color:A(T.gold) };

  function mergeBorder(cell, sides) {
    const b = Object.assign({}, cell.border);
    if (sides.top) b.top = sides.top;
    if (sides.left) b.left = sides.left;
    if (sides.bottom) b.bottom = sides.bottom;
    if (sides.right) b.right = sides.right;
    cell.border = b;
  }

  function defaultPeriods(periods) {
    const p1 = periods[periods.length - 1];
    let p0 = periods.includes(p1 - 100) ? p1 - 100
           : (periods.length > 12 ? periods[periods.indexOf(p1) - 12] : periods[0]);
    if (p0 === p1 && periods.length > 1) p0 = periods[periods.length - 2];
    return { p0, p1 };
  }

  function buildSheet(wb, a) {
    const periods = a.periods.filter((p) => Math.floor(p / 100) >= 2025), data = a.data, kind = a.kind;
    const ws = wb.addWorksheet(a.sheetName, { views: [{ state:"frozen", xSplit:5, ySplit:5, showGridLines:false }] });
    let items = Object.keys(data);
    const { p0, p1 } = defaultPeriods(periods);

    const isUn = kind === "un";
    const prep = isUn ? (v) => Math.floor(v + 0.5) : (v) => Math.round(v * 100) / 100;
    const VAL = isUn ? "#,##0" : '"R$" #,##0.00';
    const DLT = isUn ? "+#,##0;-#,##0;0" : '"R$" +#,##0.00;"R$" -#,##0.00;0';
    const PCT = "+0.0%;-0.0%;0.0%";
    const unit = isUn ? "un." : "R$";
    const metricLbl = isUn ? "UNIDADES" : "R$ (PPP)";
    const metricSub = isUn ? "unidades (arredondado)" : "reais (PPP)";

    const piv = {};
    items.forEach((m) => { piv[m] = {}; for (const p in data[m]) piv[m][p] = prep(data[m][p]); });
    const dlt = (m) => (piv[m][p1] || 0) - (piv[m][p0] || 0);
    const gapDir = a.gapOrder === "asc" ? -1 : 1; // "asc" = piores GAPs primeiro; padrão = maiores primeiro
    items.sort((x, y) => gapDir * (dlt(y) - dlt(x)) || ((piv[y][p1] || 0) - (piv[x][p1] || 0)));

    const FMC = 6;
    const pcol = (p) => FMC + periods.indexOf(p);
    const LAST = FMC + periods.length - 1;
    const j0 = colLetter(pcol(p0)), j1 = colLetter(pcol(p1));
    const TOTAL = 5, DATA0 = 6, DATA1 = DATA0 + items.length - 1;
    const june = new Set([pcol(p0), pcol(p1)]);
    const entHead = /PDV/i.test(a.entity) ? "PDV" : a.entity;
    const setorShort = a.setor ? (a.setor.split(" - ").slice(-1)[0].trim()) : "";

    // row 1 title
    ws.mergeCells(1, 1, 1, LAST);
    const t = ws.getCell(1, 1);
    t.value = "PROJEÇÃO — " + entHead.toUpperCase() + " (" + metricLbl + ")" + (setorShort ? " — " + setorShort : "");
    t.font = { name:"Calibri", size:15, bold:true, color:A("FFFFFF") }; t.fill = fill(T.navy);
    t.alignment = { horizontal:"left", vertical:"middle", indent:1 }; ws.getRow(1).height = 26;
    // row 2 subtitle
    ws.mergeCells(2, 1, 2, LAST);
    const s = ws.getCell(2, 1);
    s.value = cap(mfull(p1).toLowerCase()) + " = projeção  •  demais meses = realizado  •  valores em " + metricSub +
              "   |   Dif. e Var. % comparam " + mlabel(p1) + " vs " + mlabel(p0) + ":  verde = projeta mais, vermelho = menos";
    s.font = { name:"Calibri", size:9, italic:true, color:A("404040") };
    s.alignment = { horizontal:"left", vertical:"middle", indent:1 }; ws.getRow(2).height = 16;
    // row 3 group + entity
    ws.mergeCells(3, 1, 4, 1);
    const pc = ws.getCell(3, 1); pc.value = entHead;
    pc.font = { name:"Calibri", size:10, bold:true, color:A(T.grpfg) }; pc.fill = fill(T.grp);
    pc.alignment = { horizontal:"left", vertical:"middle", indent:1 };
    ws.mergeCells(3, 2, 3, 5);
    const dg = ws.getCell(3, 2); dg.value = "DESTAQUE — " + mfull(p1) + " vs " + mfull(p0);
    dg.font = { name:"Calibri", size:10, bold:true, color:A(T.grpfg) }; dg.fill = fill(T.grp);
    dg.alignment = { horizontal:"center", vertical:"middle" };
    const yrs = [...new Set(periods.map((p) => Math.floor(p / 100)))].sort();
    const yband = { 2024:T.y2024, 2025:T.y2025, 2026:T.y2026 };
    yrs.forEach((yr) => {
      const cs = periods.map((p, i) => (Math.floor(p / 100) === yr ? FMC + i : -1)).filter((x) => x > 0);
      ws.mergeCells(3, cs[0], 3, cs[cs.length - 1]);
      const yc = ws.getCell(3, cs[0]); yc.value = String(yr);
      yc.font = { name:"Calibri", size:10, bold:true, color:A("FFFFFF") }; yc.fill = fill(yband[yr] || T.y2025);
      yc.alignment = { horizontal:"center", vertical:"middle" };
    });
    ws.getRow(3).height = 16;
    // row 4 detail headers
    const det = { 2: cap(mlabel(p0)), 3: cap(mlabel(p1)) + "\n(Proj.)", 4: "Dif.\n(" + unit + ")", 5: "Var.\n%" };
    [2,3,4,5].forEach((col) => {
      const c = ws.getCell(4, col); c.value = det[col];
      c.font = { name:"Calibri", size:9, bold:true, color:A(T.detfg) }; c.fill = fill(T.det);
      c.alignment = { horizontal:"center", vertical:"middle", wrapText:true };
    });
    periods.forEach((p, i) => {
      const yr = Math.floor(p / 100), isproj = p === p1;
      const hfill = yr === 2026 ? (isproj ? T.det26 : T.det26soft) : T.det;
      const hfg = yr === 2026 ? T.det26fg : T.detfg;
      const c = ws.getCell(4, FMC + i); c.value = mlabel(p);
      c.font = { name:"Calibri", size:8.5, bold:true, color:A(hfg) };
      c.fill = fill(hfill);
      c.alignment = { horizontal:"center", vertical:"middle" };
    });
    ws.getRow(4).height = 26;

    function sumAt(p) { let s = 0; items.forEach((m) => { if (piv[m][p] != null) s += piv[m][p]; }); return s; }

    function styleNum(c, isTotal, col, r) {
      if (col === 5) c.numFmt = PCT; else if (col === 4) c.numFmt = DLT; else if (col >= 2) c.numFmt = VAL;
      c.alignment = { horizontal:"center", vertical:"middle" };
      if (col === 4 || col === 5) c.font = { name:"Calibri", size:10, bold:true, color:A(isTotal ? "1F3864" : "000000") };
      else if (col === 2 || col === 3) c.font = { name:"Calibri", size:10, bold:!!isTotal, color:A(isTotal ? "1F3864" : "000000") };
      else c.font = { name:"Calibri", size:9.5, bold:(isTotal || col === pcol(p1) || col === pcol(p0)), color:A(isTotal ? "1F3864" : "000000") };
      const zebra = !isTotal && ((r - DATA0) % 2 === 1);
      if (isTotal) c.fill = fill(T.total);
      else if (col === 2 || col === 3 || col === pcol(p1)) c.fill = fill(T.june);
      else if (col === pcol(p0)) c.fill = fill(T.soft26);
      else if (zebra) c.fill = fill(T.zebra);
    }
    function paintDelta(c, val) {
      const f = val > 0 ? T.green : val < 0 ? T.red : null;
      const fg = val > 0 ? T.greenfg : val < 0 ? T.redfg : "5B6573";
      c.font = { name:"Calibri", size:10, bold:true, color:A(fg) };
      c.fill = fill(f || "EEF1F5");
    }

    function writeRow(r, name, valuesOf, isTotal) {
      const nm = ws.getCell(r, 1); nm.value = isTotal ? "TOTAL GERAL" : clean(name);
      nm.font = { name:"Calibri", size:10, bold:true, color:A(isTotal ? "1F3864" : "000000") };
      nm.alignment = { horizontal:"left", vertical:"middle", indent:1 };
      // timeline
      periods.forEach((p, i) => {
        const col = FMC + i, c = ws.getCell(r, col);
        const v = valuesOf(p);
        if (v != null) c.value = isTotal ? { formula: "SUM(" + colLetter(col) + DATA0 + ":" + colLetter(col) + DATA1 + ")", result: v } : v;
        styleNum(c, isTotal, col, r);
      });
      const v0 = valuesOf(p0) || 0, v1 = valuesOf(p1) || 0, dif = v1 - v0, vp = v0 > 0 ? dif / v0 : null;
      // comparison B/C reference the timeline June columns
      const bc = ws.getCell(r, 2);
      bc.value = isTotal ? { formula: "SUM(B" + DATA0 + ":B" + DATA1 + ")", result: v0 } : { formula: "=" + j0 + r, result: v0 };
      styleNum(bc, isTotal, 2, r);
      const cc = ws.getCell(r, 3);
      cc.value = isTotal ? { formula: "SUM(C" + DATA0 + ":C" + DATA1 + ")", result: v1 } : { formula: "=" + j1 + r, result: v1 };
      styleNum(cc, isTotal, 3, r);
      const dc = ws.getCell(r, 4);
      dc.value = { formula: "C" + r + "-B" + r, result: dif }; dc.numFmt = DLT;
      dc.alignment = { horizontal:"center", vertical:"middle" }; paintDelta(dc, dif);
      const ec = ws.getCell(r, 5); ec.numFmt = PCT; ec.alignment = { horizontal:"center", vertical:"middle" };
      if (vp == null) { ec.value = { formula: 'IFERROR((C' + r + '-B' + r + ')/B' + r + ',"")', result: "" }; ec.font = { name:"Calibri", size:10, bold:true, color:A("5B6573") }; ec.fill = fill("EEF1F5"); }
      else { ec.value = { formula: 'IFERROR((C' + r + '-B' + r + ')/B' + r + ',"")', result: vp }; paintDelta(ec, vp); }
    }

    // TOTAL row then data rows
    writeRow(TOTAL, "TOTAL GERAL", (p) => sumAt(p), true);
    items.forEach((m, k) => { const r = DATA0 + k; writeRow(r, m, (p) => (piv[m][p] != null ? piv[m][p] : null), false); });

    // borders
    for (let r = 3; r <= DATA1; r++) for (let col = 1; col <= LAST; col++) ws.getCell(r, col).border = { top:thin, left:thin, bottom:thin, right:thin };
    for (let r = 1; r <= DATA1; r++) mergeBorder(ws.getCell(r, 5), { right: med });
    june.forEach((jc) => { for (let r = 3; r <= DATA1; r++) mergeBorder(ws.getCell(r, jc), { left:goldMed, right:goldMed }); });
    for (let col = 1; col <= LAST; col++) { mergeBorder(ws.getCell(4, col), { bottom: med }); mergeBorder(ws.getCell(TOTAL, col), { top:med, bottom:med }); }
    for (let r = 3; r <= DATA1; r++) mergeBorder(ws.getCell(r, 1), { left: med });

    // widths
    let maxName = 20; items.forEach((m) => { maxName = Math.max(maxName, clean(m).length); });
    ws.getColumn(1).width = Math.min(46, Math.max(22, Math.round(maxName * 1.05)));
    if (isUn) { ws.getColumn(2).width = 9; ws.getColumn(3).width = 11; ws.getColumn(4).width = 9; ws.getColumn(5).width = 9; }
    else { ws.getColumn(2).width = 15; ws.getColumn(3).width = 15; ws.getColumn(4).width = 15; ws.getColumn(5).width = 10; }
    const mw = isUn ? 7 : 14.5;
    periods.forEach((p, i) => { ws.getColumn(FMC + i).width = mw; });

    // footnote
    const nr = DATA1 + 2;
    const fn = ws.getCell(nr, 1);
    fn.value = "Obs.: itens sem " + mlabel(p1) + " aparecem como 0 (Var. -100%) e sem " + mlabel(p0) +
               " aparecem como 0 (Var. em branco). Métrica e tipo lidos do cabeçalho do arquivo cru.";
    fn.font = { name:"Calibri", size:8.5, italic:true, color:A("808080") };
    return { sheet: a.sheetName, items: items.length, p0, p1 };
  }

  function colLetter(n) { let s = ""; while (n > 0) { const r = (n - 1) % 26; s = String.fromCharCode(65 + r) + s; n = (n - r - 1) / 26; } return s; }

  function entityRank(entity) {
    const e = (entity || "").toUpperCase();
    if (e === "MARCA") return 0;
    if (e === "CIDADE") return 1;
    if (/PDV/.test(e)) return 2;
    if (e === "BRICK") return 3;
    return 9;
  }

  function buildWorkbook(ExcelJSlib, analyses) {
    const wb = new ExcelJSlib.Workbook();
    wb.creator = "Painel de Projeção";
    const ordered = analyses.slice().sort((a, b) =>
      (entityRank(a.entity) - entityRank(b.entity)) ||
      ((a.kind === "un" ? 0 : 1) - (b.kind === "un" ? 0 : 1)));
    const used = {};
    ordered.forEach((a) => {
      let nm = a.sheetName.slice(0, 31).replace(/[\[\]:*?/\\]/g, "");
      if (used[nm]) { let i = 2; while (used[nm + " " + i]) i++; nm = (nm.slice(0, 28) + " " + i); }
      used[nm] = true; a.sheetName = nm;
      buildSheet(wb, a);
    });
    return wb;
  }

  function tabName(entity, kind) {
    const e = (entity || "").toUpperCase();
    const base = e === "MARCA" ? "Marcas" : e === "BRICK" ? "Bricks" : e === "CIDADE" ? "Cidades"
               : /PDV/.test(e) ? "PDVs" : (entity || "Dados");
    return base + " (" + (kind === "un" ? "Un" : "R$") + ")";
  }

  const API = { buildWorkbook, tabName, defaultPeriods };
  if (typeof module !== "undefined" && module.exports) module.exports = API;
  else global.XlsxBuild = API;
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
/* Organizador — UI enxuta: solta arquivos crus, baixa o Excel organizado. Sem análise na tela. */
(function () {
  "use strict";
  const MES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const mlabel = (p) => p == null ? "—" : MES[(p % 100) - 1] + "/" + String(Math.floor(p / 100)).slice(2);
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s).replace(/[&<>"]/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[m]));
  const S = { files: [], gapOrder: "desc" };
  let uid = 0;

  // setor: nome curto (parte após " - ") e versão segura para nome de arquivo
  const setorShort = (s) => s ? s.split(" - ").slice(-1)[0].trim() : "";
  const safeName = (s) => String(s).replace(/[\\/:*?"<>|]+/g, "_").replace(/\s+/g, " ").trim().replace(/\s+/g, "_");
  function saveBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  function toast(msg) { const t = $("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 2600); }

  function readMatrix(buf) {
    const wb = XLSX.read(new Uint8Array(buf), { type: "array", cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    let mr = 0, mc = 0;
    for (const k of Object.keys(ws)) { const m = k.match(/^([A-Z]+)(\d+)$/); if (!m) continue; const c = XLSX.utils.decode_col(m[1]), r = +m[2] - 1; if (r > mr) mr = r; if (c > mc) mc = c; }
    if (mr || mc) ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: mr, c: mc } });
    return XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });
  }

  function handleFiles(fileList) {
    const files = [...fileList]; if (!files.length) return;
    let pending = files.length, added = 0;
    files.forEach((file) => {
      const fr = new FileReader();
      fr.onload = (e) => {
        try {
          const matrix = readMatrix(e.target.result);
          const p = ConvCore.parseRaw(matrix, file.name);
          const items = Object.keys(p.data).length;
          if (!items || !p.periods.length) { toast("Não achei dados em “" + file.name + "”."); }
          else { S.files.push({ id: "f" + (++uid), name: file.name.replace(/\.[^.]+$/, ""), metric: p.metric, entity: p.entity, setor: p.setor, periods: p.periods, data: p.data, items }); added++; }
        } catch (err) { console.error(err); toast("Erro ao ler “" + file.name + "”."); }
        if (--pending === 0) { render(); if (added) toast(added > 1 ? added + " arquivos carregados" : "Arquivo carregado"); }
      };
      fr.onerror = () => { toast("Falha ao abrir “" + file.name + "”."); if (--pending === 0) render(); };
      fr.readAsArrayBuffer(file);
    });
  }

  function badge(metric) {
    return metric === "un"
      ? '<span class="tag un">Unidades</span>'
      : '<span class="tag rs">R$ (PPP)</span>';
  }

  function render() {
    const app = $("app");
    if (!S.files.length) { app.innerHTML = emptyHTML(); wireDrop($("drop")); return; }
    const nSet = new Set(S.files.map((f) => f.setor || "—")).size;
    const rows = S.files.map((f) => `
      <li class="frow" data-id="${f.id}">
        <span class="fi">${docIcon()}</span>
        <span class="fmeta">
          <span class="fname">${esc(f.name)}</span>
          <span class="fsub">${f.setor ? '<b style="color:var(--navy-700)">' + esc(setorShort(f.setor)) + '</b>' : '<b style="color:#B42318">sem setor</b>'} · ${esc(f.entity)} ${badge(f.metric)} · ${f.items} itens · proj. ${mlabel(f.periods[f.periods.length - 1])}</span>
        </span>
        <button class="rm" data-id="${f.id}" title="Remover" aria-label="Remover ${esc(f.name)}">×</button>
      </li>`).join("");
    app.innerHTML = `
      <div class="loaded fade-in">
        <div class="lhead"><span>${S.files.length} arquivo${S.files.length > 1 ? "s" : ""} · ${nSet} setor${nSet > 1 ? "es" : ""}</span>
          <span class="lhead-actions">
            <button class="addbtn" id="addMore">+ adicionar</button>
            <button class="clearbtn" id="clearAll">Limpar tudo</button>
          </span></div>
        <ul class="flist">${rows}</ul>
        <div class="orderbar">
          <span class="orderlbl">Ordem por GAP</span>
          <div class="seg" role="group" aria-label="Ordem por GAP">
            <button type="button" class="segbtn${S.gapOrder === "desc" ? " active" : ""}" data-order="desc">Maiores primeiro</button>
            <button type="button" class="segbtn${S.gapOrder === "asc" ? " active" : ""}" data-order="asc">Piores primeiro</button>
          </div>
        </div>
        <button class="download" id="dl">${dlIcon()} ${nSet > 1 ? "Baixar " + nSet + " setores (.zip)" : "Baixar Excel organizado"}</button>
        <p class="hint2">Agrupado por setor: <b>um arquivo por setor</b>, cada visão numa aba. Vários setores saem num <b>.zip</b>. Tipo (unidades / R$) e categoria são lidos de cada arquivo; o último mês é a projeção.</p>
      </div>
      <div class="dropmini" id="drop">${upIcon()} arraste mais arquivos aqui</div>`;
    $("dl").onclick = download;
    $("addMore").onclick = () => $("file").click();
    $("clearAll").onclick = () => { S.files = []; render(); toast("Planilhas removidas"); };
    app.querySelectorAll(".segbtn").forEach((b) => (b.onclick = () => { if (S.gapOrder !== b.dataset.order) { S.gapOrder = b.dataset.order; render(); } }));
    app.querySelectorAll(".rm").forEach((b) => (b.onclick = () => { S.files = S.files.filter((f) => f.id !== b.dataset.id); render(); }));
    wireDrop($("drop"));
  }

  function emptyHTML() {
    return `<div class="empty fade-in"><div class="drop" id="drop">
      <div class="ic">${upIcon(30)}</div>
      <h2>Solte os arquivos crus do IQVIA aqui</h2>
      <p>Pode soltar vários de uma vez — <b>vários setores</b> e visões (unidades e R$). A página lê tudo no seu navegador, <b>agrupa por setor</b> (um arquivo por setor, cada visão numa aba) e devolve o Excel formatado — vários setores saem num <b>.zip</b>. Nada é enviado para fora.</p>
      <button class="cta" id="pick">Selecionar arquivos (.xlsx)</button>
      <div class="fmt">Lê automaticamente: <b>métrica</b> (linha 1) · <b>categoria</b> (Marca, Brick, Cidade, PDV) · <b>último mês = projeção</b></div>
    </div></div>`;
  }

  async function download() {
    if (!S.files.length || !window.ExcelJS) return;
    const btn = $("dl"); btn.disabled = true; const old = btn.innerHTML; btn.textContent = "Gerando…";
    try {
      // agrupa os arquivos por SETOR, preservando a ordem em que os setores apareceram
      const groups = new Map();
      S.files.forEach((f) => {
        const key = f.setor || "Consolidada";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(f);
      });

      // monta um workbook por setor (cada visão/arquivo vira uma aba)
      const built = []; // { fname, buf, tabs }
      for (const [setor, files] of groups) {
        const analyses = files.map((f) => ({ sheetName: XlsxBuild.tabName(f.entity, f.metric), entity: f.entity, setor: f.setor, kind: f.metric, periods: f.periods, data: f.data, gapOrder: S.gapOrder }));
        const wb = XlsxBuild.buildWorkbook(window.ExcelJS, analyses);
        const buf = await wb.xlsx.writeBuffer();
        const nome = setor === "Consolidada" ? "Consolidada" : (safeName(setorShort(setor)) || safeName(setor));
        built.push({ fname: "Projecao_" + nome + ".xlsx", buf, tabs: analyses.length });
      }

      const XLSXMIME = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
      if (built.length === 1) {
        // um setor só: baixa o .xlsx direto, sem zip
        saveBlob(new Blob([built[0].buf], { type: XLSXMIME }), built[0].fname);
        toast("Excel gerado · 1 setor · " + built[0].tabs + " aba" + (built[0].tabs > 1 ? "s" : ""));
      } else {
        // vários setores: um arquivo por setor, empacotados num .zip
        if (!window.JSZip) { toast("JSZip não carregou — verifique a conexão."); return; }
        const zip = new JSZip();
        built.forEach((b) => zip.file(b.fname, b.buf));
        const zipBlob = await zip.generateAsync({ type: "blob" });
        saveBlob(zipBlob, "Projecoes_" + built.length + "_setores.zip");
        toast(built.length + " setores · " + S.files.length + " abas · .zip gerado");
      }
    } catch (err) { console.error(err); toast("Não consegui gerar o Excel."); }
    finally { btn.disabled = false; btn.innerHTML = old; }
  }

  function wireDrop(drop) {
    if (!drop) return;
    if (drop.id === "drop" && $("pick")) $("pick").onclick = () => $("file").click();
    drop.onclick = (e) => { if (e.target.closest("button")) return; $("file").click(); };
    ["dragenter", "dragover"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("over"); }));
    ["dragleave", "drop"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("over"); }));
    drop.addEventListener("drop", (e) => handleFiles(e.dataTransfer.files));
  }

  const upIcon = (n) => `<svg width="${n || 22}" height="${n || 22}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>`;
  const dlIcon = () => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12m0 0l4-4m-4 4l-4-4"/><path d="M4 20h16"/></svg>`;
  const docIcon = () => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5"/></svg>`;

  function boot() {
    $("file").addEventListener("change", (e) => { handleFiles(e.target.files); e.target.value = ""; });
    ["dragenter", "dragover"].forEach((ev) => window.addEventListener(ev, (e) => { if (e.dataTransfer && [...e.dataTransfer.types].includes("Files")) e.preventDefault(); }));
    window.addEventListener("drop", (e) => { if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) { e.preventDefault(); handleFiles(e.dataTransfer.files); } });
    render();
  }
  document.addEventListener("DOMContentLoaded", boot);
})();

</script>
</body>
